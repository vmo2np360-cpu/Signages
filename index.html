<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Signage 記錄系統 </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 讓按鈕和輸入框更容易點擊 */
        button, input[type="file"]::file-selector-button {
            cursor: pointer;
        }
        /* 檔案輸入的自訂樣式 (讓它更像一個按鈕) */
        .custom-file-input {
            position: relative;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

<div id="app" class="container mx-auto p-4">
    <!-- 登入畫面 -->
    <div id="login-view" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow-lg">
        <h2 class="text-2xl font-bold mb-6 text-center">Signage 系統登入</h2>
        <input type="email" id="login-email" placeholder="電郵" class="w-full border p-3 mb-4 rounded text-base">
        <input type="password" id="login-pwd" placeholder="密碼" class="w-full border p-3 mb-4 rounded text-base">
        <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 text-base font-medium">登入</button>
    </div>

    <!-- 主畫面 -->
    <div id="main-view" class="hidden">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl md:text-2xl font-bold text-blue-800">網上記錄 Signage</h1>
            <button onclick="handleLogout()" class="text-red-500 underline text-base p-2">登出</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 左側：新增/編輯表單 (手機上佔滿) -->
            <div class="bg-white p-5 rounded-lg shadow">
                <h2 class="font-bold mb-4 border-b pb-2 text-lg" id="form-title">新增 Signage</h2>
                <div class="space-y-4">
                    <input type="text" id="zh-name" placeholder="中文名稱" class="w-full border p-3 rounded text-base">
                    <input type="text" id="en-name" placeholder="英文名稱" class="w-full border p-3 rounded text-base">
                    
                    <label class="block text-sm font-medium text-gray-700">尺寸</label>
                    <select id="size" class="w-full border p-3 rounded text-base bg-white">
                        <option>A5</option><option>A4</option><option>A3</option><option>A1</option><option>GIP</option>
                    </select>

                    <label class="block text-sm font-medium text-gray-700">儲存地點</label>
                    <select id="location" class="w-full border p-3 rounded text-base bg-white">
                        <!-- 原有 Shelf 1~7 -->
                        <option>Shelf 1</option><option>Shelf 2</option><option>Shelf 3</option>
                        <option>Shelf 4</option><option>Shelf 5</option><option>Shelf 6</option><option>Shelf 7</option>
                        <!-- 新增 -->
                        <option>P1</option><option>P2</option><option>P3</option><option>P4</option><option>P5</option><option>P6</option><option>P7</option>
                        <option>Shelf 8</option><option>Shelf 9</option><option>Table</option>
                    </select>

                    <label class="block text-sm font-medium text-gray-700">材質</label>
                    <select id="material" class="w-full border p-3 rounded text-base bg-white">
                        <option>Acrylic Board</option><option>Sheet</option><option>Magnetic</option><option>Sticker</option>
                        <!-- 新增 -->
                        <option>Poster</option><option>Flag</option>
                    </select>

                    <!-- 數量輸入 -->
                    <label class="block text-sm font-medium text-gray-700">數量</label>
                    <input type="number" id="quantity" min="1" value="1" class="w-full border p-3 rounded text-base">

                    <!-- PDF 上傳 -->
                    <label class="block text-sm font-medium text-gray-700">上傳 PDF (選填，留空則保留原有)</label>
                    <input type="file" id="pdf-file" accept=".pdf,application/pdf" class="w-full text-sm border p-2 rounded file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">

                    <!-- 圖片上傳 - 加上 capture 屬性，手機可直接拍照 -->
                    <label class="block text-sm font-medium text-gray-700">📷 上傳圖片 (拍照或選擇，JPG/PNG，自動壓縮)</label>
                    <input type="file" id="image-file" accept="image/jpeg,image/png,image/jpg" class="w-full text-sm border p-2 rounded file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
                    
                    <div class="flex gap-3 mt-4">
                        <button onclick="handleFormSubmit()" id="btn-submit" class="flex-1 bg-green-600 text-white p-3 rounded-lg text-base font-medium hover:bg-green-700 active:bg-green-800">確認儲存</button>
                        <button onclick="cancelEdit()" id="btn-cancel" class="flex-1 bg-gray-400 text-white p-3 rounded-lg text-base font-medium hover:bg-gray-500 hidden">取消編輯</button>
                    </div>
                </div>
            </div>

            <!-- 右側：列表與搜尋 -->
            <div class="lg:col-span-2">
                <div class="bg-white p-4 rounded-lg shadow mb-4">
                    <input type="text" id="search-input" oninput="renderList()" placeholder="🔍 搜尋名稱或編號..." class="w-full border-2 border-blue-100 p-3 rounded-lg text-base focus:border-blue-500 outline-none">
                </div>
                <div id="signage-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- 動態產生的記錄卡片 -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Supabase SDK -->
<script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://tvlawluemqowbultjhzl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2bGF3bHVlbXFvd2J1bHRqaHpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjEwMTgsImV4cCI6MjA4ODgzNzAxOH0.7WA04as-aYZYqKJLT3nl6f2jSx4P7pyZOyiA8RGaXiM';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let allSignages = [];
    let editingId = null;
    let originalPdfUrl = null;
    let originalImageUrl = null;

    // ---------- 認證處理 ----------
    window.handleLogin = async () => {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pwd').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
        if (error) alert('登入失敗: ' + error.message);
    };

    window.handleLogout = async () => {
        await supabase.auth.signOut();
        allSignages = [];
        renderList();
        cancelEdit();
    };

    supabase.auth.onAuthStateChange((event, session) => {
        const user = session?.user ?? null;
        document.getElementById('login-view').classList.toggle('hidden', !!user);
        document.getElementById('main-view').classList.toggle('hidden', !user);
        if (user) loadData();
        else {
            allSignages = [];
            renderList();
            cancelEdit();
        }
    });

    (async () => {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
            loadData();
        }
    })();

    // ---------- 圖片壓縮函數 ----------
    function compressImage(file, maxWidth = 1024, maxHeight = 1024, quality = 0.8) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    let width = img.width;
                    let height = img.height;
                    if (width > height) {
                        if (width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxHeight) {
                            width *= maxHeight / height;
                            height = maxHeight;
                        }
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => {
                        if (!blob) reject(new Error('Canvas 轉換失敗'));
                        resolve(blob);
                    }, 'image/jpeg', quality);
                };
                img.onerror = reject;
            };
            reader.onerror = reject;
        });
    }

    // ---------- 格式化檔案大小 ----------
    function formatFileSize(bytes) {
        if (!bytes || bytes === 0) return '';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    // ---------- 從URL提取Storage路徑 ----------
    function extractPathFromUrl(url) {
        if (!url) return null;
        const base = `${SUPABASE_URL}/storage/v1/object/public/signages/`;
        if (url.startsWith(base)) {
            return url.substring(base.length);
        }
        return null;
    }

    // ---------- 刪除Storage檔案 ----------
    async function deleteStorageFile(url) {
        if (!url) return;
        const path = extractPathFromUrl(url);
        if (path) {
            await supabase.storage.from('signages').remove([path]);
        }
    }

    // ---------- 上傳檔案（若無檔案則返回null）----------
    async function uploadFileIfSelected(fileInput, folder, isImage = false) {
        const file = fileInput.files[0];
        if (!file) return null;

        let fileToUpload = file;
        if (isImage) {
            const compressedBlob = await compressImage(file);
            const fileName = file.name.replace(/\.[^/.]+$/, '') + '.jpg';
            fileToUpload = new File([compressedBlob], fileName, { type: 'image/jpeg' });
        }

        const filePath = `${folder}/${Date.now()}_${fileToUpload.name}`;
        const { error } = await supabase.storage.from('signages').upload(filePath, fileToUpload);
        if (error) throw error;
        const { data: urlData } = supabase.storage.from('signages').getPublicUrl(filePath);
        return urlData.publicUrl;
    }

    // ---------- 表單提交（新增/編輯，含數量）----------
    window.handleFormSubmit = async () => {
        const btn = document.getElementById('btn-submit');
        const zhName = document.getElementById('zh-name').value.trim();
        const enName = document.getElementById('en-name').value.trim();
        const size = document.getElementById('size').value;
        const location = document.getElementById('location').value;
        const material = document.getElementById('material').value;
        const quantity = parseInt(document.getElementById('quantity').value, 10) || 1;
        const pdfInput = document.getElementById('pdf-file');
        const imgInput = document.getElementById('image-file');

        if (!zhName && !enName) {
            alert('請至少填寫中文或英文名稱');
            return;
        }

        btn.disabled = true;
        btn.innerText = '處理中...';

        try {
            let pdfUrl = null, imageUrl = null;
            let pdfSize = null;

            // 處理PDF
            if (pdfInput.files.length > 0) {
                pdfUrl = await uploadFileIfSelected(pdfInput, 'pdfs', false);
                pdfSize = pdfInput.files[0].size;
                if (editingId && originalPdfUrl) {
                    await deleteStorageFile(originalPdfUrl);
                }
            } else if (editingId && originalPdfUrl) {
                pdfUrl = originalPdfUrl;
                pdfSize = allSignages.find(s => s.id === editingId)?.pdf_size || null;
            }

            // 處理圖片 (自動壓縮已在uploadFileIfSelected中處理)
            if (imgInput.files.length > 0) {
                imageUrl = await uploadFileIfSelected(imgInput, 'images', true);
                if (editingId && originalImageUrl) {
                    await deleteStorageFile(originalImageUrl);
                }
            } else if (editingId && originalImageUrl) {
                imageUrl = originalImageUrl;
            }

            const baseData = {
                zh_name: zhName,
                en_name: enName,
                size,
                location,
                material,
                quantity,
                pdf_url: pdfUrl,
                image_url: imageUrl,
                pdf_size: pdfSize,
            };

            if (editingId) {
                await supabase.from('signages').update(baseData).eq('id', editingId);
                alert('更新成功！');
            } else {
                const newRecord = {
                    ...baseData,
                    signage_id: 'SIG-' + Math.floor(Math.random() * 10000),
                    created_at: new Date()
                };
                await supabase.from('signages').insert([newRecord]);
                alert('儲存完成！');
            }

            cancelEdit();
            document.getElementById('pdf-file').value = '';
            document.getElementById('image-file').value = '';
            await loadData();
        } catch (e) {
            alert('錯誤：' + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = editingId ? '更新記錄' : '確認儲存';
        }
    };

    // ---------- 開始編輯 ----------
    window.startEdit = (record) => {
        document.getElementById('zh-name').value = record.zh_name || '';
        document.getElementById('en-name').value = record.en_name || '';
        document.getElementById('size').value = record.size || 'A5';
        document.getElementById('location').value = record.location || 'Shelf 1';
        document.getElementById('material').value = record.material || 'Acrylic Board';
        document.getElementById('quantity').value = record.quantity || 1;

        document.getElementById('pdf-file').value = '';
        document.getElementById('image-file').value = '';

        editingId = record.id;
        originalPdfUrl = record.pdf_url;
        originalImageUrl = record.image_url;

        document.getElementById('form-title').innerText = '編輯 Signage';
        document.getElementById('btn-submit').innerText = '更新記錄';
        document.getElementById('btn-cancel').classList.remove('hidden');
    };

    // ---------- 取消編輯 ----------
    window.cancelEdit = () => {
        editingId = null;
        originalPdfUrl = null;
        originalImageUrl = null;
        document.getElementById('zh-name').value = '';
        document.getElementById('en-name').value = '';
        document.getElementById('size').value = 'A5';
        document.getElementById('location').value = 'Shelf 1';
        document.getElementById('material').value = 'Acrylic Board';
        document.getElementById('quantity').value = 1;
        document.getElementById('pdf-file').value = '';
        document.getElementById('image-file').value = '';

        document.getElementById('form-title').innerText = '新增 Signage';
        document.getElementById('btn-submit').innerText = '確認儲存';
        document.getElementById('btn-cancel').classList.add('hidden');
    };

    // ---------- 刪除記錄 ----------
    window.deleteRecord = async (id, pdfUrl, imageUrl) => {
        if (!confirm('確定要刪除此記錄嗎？此操作無法復原。')) return;
        try {
            await deleteStorageFile(pdfUrl);
            await deleteStorageFile(imageUrl);
            const { error } = await supabase.from('signages').delete().eq('id', id);
            if (error) throw error;
            alert('刪除成功');
            if (editingId === id) cancelEdit();
            await loadData();
        } catch (e) {
            alert('刪除失敗：' + e.message);
        }
    };

    // ---------- 載入資料 ----------
    async function loadData() {
        const { data, error } = await supabase
            .from('signages')
            .select('*')
            .order('created_at', { ascending: false });
        if (error) {
            console.error('載入資料失敗:', error);
        } else {
            allSignages = data || [];
            renderList();
        }
    }

    // ---------- 渲染列表 (含數量顯示，手機卡片優化) ----------
    window.renderList = () => {
        const term = document.getElementById('search-input').value.toLowerCase();
        const container = document.getElementById('signage-list');

        const filtered = allSignages.filter(s =>
            (s.zh_name && s.zh_name.toLowerCase().includes(term)) ||
            (s.en_name && s.en_name.toLowerCase().includes(term)) ||
            (s.signage_id && s.signage_id.toLowerCase().includes(term))
        );

        container.innerHTML = filtered.map(s => `
            <div class="bg-white p-4 rounded shadow border-l-4 border-blue-500 relative">
                <div class="flex justify-between items-start">
                    <span class="bg-gray-200 text-xs px-2 py-1 rounded font-mono">${s.signage_id || ''}</span>
                    <div class="flex gap-3">
                        <button onclick='startEdit(${JSON.stringify(s).replace(/'/g, "\\'")})' class="text-blue-600 hover:text-blue-800 text-sm flex items-center gap-1 p-1"><span>✏️</span>編輯</button>
                        <button onclick="deleteRecord('${s.id}', '${s.pdf_url || ''}', '${s.image_url || ''}')" class="text-red-600 hover:text-red-800 text-sm flex items-center gap-1 p-1"><span>🗑️</span>刪除</button>
                    </div>
                </div>
                ${s.image_url 
                    ? `<img src="${s.image_url}" alt="signage" class="w-full h-32 object-cover rounded mt-2 mb-2">`
                    : `<div class="w-full h-32 bg-gray-200 rounded mt-2 mb-2 flex items-center justify-center text-gray-500">📷 無圖片</div>`}
                <h3 class="font-bold mt-2 text-base">${s.zh_name || ''}</h3>
                <p class="text-sm text-gray-600">${s.en_name || ''}</p>
                <div class="mt-3 text-xs grid grid-cols-2 gap-1 text-gray-500">
                    <span>尺寸: ${s.size || ''}</span>
                    <span>地點: ${s.location || ''}</span>
                    <span class="col-span-2">材質: ${s.material || ''}</span>
                    <span class="col-span-2">數量: ${s.quantity || 1}</span>
                </div>
                ${s.pdf_url 
                    ? `<div class="flex justify-between items-center mt-4">
                        <a href="${s.pdf_url}" target="_blank" class="bg-blue-50 text-blue-600 py-2 px-3 rounded hover:bg-blue-100 text-sm flex items-center gap-1"><span>📄</span>下載 PDF</a>
                        <span class="text-xs text-gray-500">${s.pdf_size ? formatFileSize(s.pdf_size) : ''}</span>
                       </div>`
                    : `<div class="text-center mt-4 text-gray-400 text-sm">無 PDF</div>`}
            </div>
        `).join('');
    };
</script>
</body>
</html>
